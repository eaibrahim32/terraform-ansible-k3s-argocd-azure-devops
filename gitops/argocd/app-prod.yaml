# Prod: MANUAL sync (no automated). A lead gates prod promotion deliberately.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-prod
  namespace: argocd
spec:
  project: capstone
  source:
    repoURL: https://github.com/eaibrahim32/terraform-ansible-k3s-argocd-azure-devops.git
    targetRevision: main
    path: gitops/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
