apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
resources:
  - ../../base
patches:
  - target: {kind: Namespace, name: app}
    patch: |
      - op: replace
        path: /metadata/name
        value: prod
  - target: {kind: ConfigMap, name: app-config}
    patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: prod
  - target: {kind: PodDisruptionBudget, name: app}
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2
images:
  - name: app
    newName: REPLACE_ACR_LOGIN_SERVER/app
    newTag: REPLACE_GIT_SHA
