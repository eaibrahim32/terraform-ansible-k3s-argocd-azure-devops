---
- name: Check if k3s already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install k3s (single-node, Traefik ingress + servicelb built in)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644" sh -
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_bin.stat.exists

- name: Wait for node to be Ready
  ansible.builtin.shell: |
    k3s kubectl wait --for=condition=Ready node --all --timeout=120s
  changed_when: false

- name: Ensure kube dir for admin user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Copy kubeconfig for admin user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Fetch kubeconfig back to controller (for local kubectl over tunnel)
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./artifacts/kubeconfig.yaml
    flat: true
